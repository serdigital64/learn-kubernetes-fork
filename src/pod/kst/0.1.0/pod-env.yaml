---
apiVersion: "v1"
kind: "Pod"
metadata:
  name: "pod-env"
  labels:
    app: "pod-env"
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 6464
  containers:
    - image: "busybox:latest"
      name: "busybox"
      resources:
        requests:
          cpu: "10m"
          memory: "24Mi"
        limits:
          cpu: "20m"
          memory: "32Mi"
      securityContext:
        readOnlyRootFilesystem: true
      command:
        - "/bin/sh"
        - "-c"
        - "while true; do env; sleep 10; done"
      env:
        - name: "MY_NODE_NAME"
          valueFrom:
            fieldRef:
              fieldPath: "spec.nodeName"
        - name: "MY_POD_NAME"
          valueFrom:
            fieldRef:
              fieldPath: "metadata.name"
        - name: "MY_POD_NAMESPACE"
          valueFrom:
            fieldRef:
              fieldPath: "metadata.namespace"
        - name: "MY_POD_IP"
          valueFrom:
            fieldRef:
              fieldPath: "status.podIP"
        - name: "MY_POD_SERVICE_ACCOUNT"
          valueFrom:
            fieldRef:
              fieldPath: "spec.serviceAccountName"
        - name: "MY_INTERNAL_REFERENCE"
          value: "$(MY_POD_NAMESPACE)/$(MY_POD_NAME)"
...
